<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Romance Fantasy Hashtag Network</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="topbar">
    <div class="site-title">Romance Fantasy Hashtag Network</div>

    <nav class="nav-links">
      <a href="index.html">Explore</a>
      <a href="#about">About</a>
      <a href="#how-to">How to</a>
      <a href="essay.html">Visual Essay</a>
      <a href="methodology.html">Methodology</a>
    </nav>
  </header>

  <main class="explorer-layout">
    <section id="network-area">
      <svg id="network"></svg>
    </section>

    <aside id="control-panel">
      <section class="panel-section">
        <h2>Data Status</h2>
        <p id="data-status">Loading data...</p>
      </section>

      <section class="panel-section">
        <h2>Filters</h2>

        <h3>Category</h3>
        <div id="category-filters"></div>

        <label class="slider-label">
          Minimum frequency:
          <span id="frequency-value">1</span>
          <input id="min-frequency" type="range" min="1" max="50" value="1">
        </label>

        <label class="slider-label">
          Minimum edge weight:
          <span id="weight-value">1</span>
          <input id="min-weight" type="range" min="1" max="20" value="1">
        </label>

        <label class="checkbox-row">
          <input id="hide-power" type="checkbox">
          Hide 능력녀
        </label>
      </section>

      <section class="panel-section">
        <h2>Compare Tags</h2>

        <label>
          Tag A
          <select id="compare-a"></select>
        </label>

        <label>
          Tag B
          <select id="compare-b"></select>
        </label>

        <button id="compare-button">Compare</button>

        <div id="compare-results">
          Choose two tags to compare their co-occurrence patterns.
        </div>
      </section>

      <section class="panel-section">
        <h2>Inspector</h2>
        <div id="inspector">
          Click a node or edge to inspect it.
        </div>
      </section>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/app.js"></script>
</body>
</html>
